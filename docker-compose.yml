services:
  psicosaas:
    build:
      context: .
      args:
        - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
        - NEXT_PUBLIC_STRIPE_PUBLIC_KEY=${NEXT_PUBLIC_STRIPE_PUBLIC_KEY}
    container_name: psicosaas
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DIRECT_URL=${DIRECT_URL}
      - JWT_SECRET=${JWT_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - WHATS_API_URL=${WHATS_API_URL:-http://evolution:8080}
      - WHATS_API_KEY=${WHATS_API_KEY}
      - WHATS_MASTER_INSTANCE=${WHATS_MASTER_INSTANCE}
      - NODE_OPTIONS=--dns-result-order=ipv4first
    depends_on:
      - psicosaas_db
      - evolution

  psicosaas_db:
    image: postgres:15-alpine
    container_name: psicosaas_db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=intelbras3246
      - POSTGRES_DB=psico_db
    ports:
      - "5432:5432"
    volumes:
      - psicosaas_db_data:/var/lib/postgresql/data

  evolution:
    image: atendai/evolution-api:v2.1.1
    container_name: evolution
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SERVER_TYPE=NODE
      - AUTH_TOKEN=${WHATS_API_KEY:-"123456"}
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=${WHATS_API_KEY:-"123456"}
      - REDIS_ENABLED=true
      - REDIS_URI=redis://redis:6379/1
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgres://evouser:evopass@evolution_db:5432/evolution?schema=public
      - SERVER_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:8080}
    depends_on:
      - redis
      - evolution_db

  evolution_db:
    image: postgres:15-alpine
    container_name: evolution_db
    restart: always
    environment:
      - POSTGRES_USER=evouser
      - POSTGRES_PASSWORD=evopass
      - POSTGRES_DB=evolution
    volumes:
      - evol_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    command: redis-server --appendonly yes

volumes:
  psicosaas_db_data:
  evol_data:

networks:
  default:
    name: public_network
    external: true

