services:
  psicosaas:
    build:
      context: .
      args:
        - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
        - NEXT_PUBLIC_STRIPE_PUBLIC_KEY=${NEXT_PUBLIC_STRIPE_PUBLIC_KEY}
    container_name: psicosaas
    restart: always
    ports:
      - "80:3000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:intelbras3246@psicosaas_db:5432/psico_db
      - DIRECT_URL=postgresql://postgres:intelbras3246@psicosaas_db:5432/psico_db
      - JWT_SECRET=${JWT_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - WHATS_API_URL=http://evolution:8080
      - WHATS_API_KEY=123456
      - NODE_OPTIONS=--dns-result-order=ipv4first
    depends_on:
      - psicosaas_db
      - evolution

  psicosaas_db:
    image: postgres:15-alpine
    container_name: psicosaas_db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=intelbras3246
      - POSTGRES_DB=psico_db
    ports:
      - "5432:5432"
    volumes:
      - psicosaas_db_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh

  evolution:
    image: atendai/evolution-api:v2.2.3
    container_name: evolution
    restart: always
    environment:
      - SERVER_PORT=8080
      # Auth
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=123456
      # Database (required for v2)
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://postgres:intelbras3246@psicosaas_db:5432/evolution_db?sslmode=disable
      - DATABASE_CONNECTION_CLIENT_NAME=evolution_api
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=true
      - DATABASE_SAVE_MESSAGE_UPDATE=true
      - DATABASE_SAVE_DATA_CONTACTS=true
      - DATABASE_SAVE_DATA_CHATS=true
      # QR Code
      - QRCODE_LIMIT=30
      - QRCODE_COLOR=#198754
      # Session
      - CONFIG_SESSION_PHONE_CLIENT=PsicoSaas
      - CONFIG_SESSION_PHONE_NAME=Chrome
      # Logs
      - LOG_LEVEL=WARN
      - LOG_COLOR=true
      # Cache
      - CACHE_REDIS_ENABLED=false
      - CACHE_LOCAL_ENABLED=true
      # Instances
      - DEL_INSTANCE=false
    ports:
      - "8080:8080"
    volumes:
      - evolution_instances:/evolution/instances
    shm_size: '1gb'
    depends_on:
      - psicosaas_db

volumes:
  psicosaas_db_data:
  evolution_instances:
