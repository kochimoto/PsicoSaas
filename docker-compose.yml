services:
  psicosaas:
    build:
      context: .
      args:
        - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
        - NEXT_PUBLIC_STRIPE_PUBLIC_KEY=${NEXT_PUBLIC_STRIPE_PUBLIC_KEY}
    container_name: psicosaas
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DIRECT_URL=${DIRECT_URL}
      - JWT_SECRET=${JWT_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - WHATS_API_KEY=${WHATS_API_KEY}
      - WHATS_MASTER_INSTANCE=${WHATS_MASTER_INSTANCE}
      - NODE_OPTIONS=--dns-result-order=ipv4first
    depends_on:
      - psicosaas_db
    networks:
      - default

  psicosaas_db:
    image: postgres:15-alpine
    container_name: psicosaas_db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=intelbras3246
      - POSTGRES_DB=psico_db
    ports:
      - "5432:5432"
    volumes:
      - psicosaas_db_data:/var/lib/postgresql/data
    networks:
      - default

  evolution:
    image: atendai/evolution-api:latest
    container_name: evolution
    restart: always
    environment:
      - SERVER_PORT=8080
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=123456
      - DATABASE_ENABLED=true
      - DATABASE_CONNECTION_URI=postgresql://postgres:intelbras3246@psicosaas_db:5432/psico_db?sslmode=disable
      - DATABASE_CONNECTION_CLIENT_NAME=evolution_api
      - DATABASE_SAVE_DATA_INSTANCE=true
      - CACHE_REDIS_ENABLED=false
      - CACHE_LOCAL_ENABLED=true
    ports:
      - "8080:8080"
    volumes:
      - evolution_instances:/evolution/instances
    shm_size: '1gb'
    networks:
      - default

volumes:
  psicosaas_db_data:
  evolution_instances:

networks:
  default:
    name: public_network
    external: true

