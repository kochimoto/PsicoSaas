services:
  psicosaas:
    build:
      context: .
      args:
        - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
        - NEXT_PUBLIC_STRIPE_PUBLIC_KEY=${NEXT_PUBLIC_STRIPE_PUBLIC_KEY}
    container_name: psicosaas
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DIRECT_URL=${DIRECT_URL}
      - JWT_SECRET=${JWT_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - WHATS_API_URL=http://evolution:8080
      - WHATS_API_KEY=${WHATS_API_KEY}
      - WHATS_MASTER_INSTANCE=${WHATS_MASTER_INSTANCE}
    depends_on:
      - evolution

  evolution:
    image: atendai/evolution-api:v2.1.1
    container_name: evolution
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SERVER_TYPE=NODE
      - AUTH_TOKEN=${WHATS_API_KEY}
      - REDIS_ENABLED=true
      - REDIS_URI=redis://redis:6379/1
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=${DIRECT_URL}?schema=evolution
      - SERVER_URL=${NEXT_PUBLIC_APP_URL}
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    command: redis-server --appendonly yes

